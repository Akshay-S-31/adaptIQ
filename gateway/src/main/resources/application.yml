server:
  port: 8080

spring:
  application:
    name: adaptiq-gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/adaptiq
    username: adaptiq
    password: adaptiq_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# AI Engine configuration
adaptiq:
  ai-engine:
    base-url: http://localhost:8000
    synthesize-path: /internal/ai/synthesize
    timeout-seconds: 120

logging:
  level:
    com.adaptiq: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
